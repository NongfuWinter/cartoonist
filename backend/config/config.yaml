# 本地配置示例：在本目录复制为 config.yaml 后按需填写。
#
# 加载规则（见同目录 config.go）：
#   - 默认读取「当前工作目录」下的 internal/config/config.yaml。
#     建议在 backend 模块根目录执行启动（如在 backend/ 下 go run ./cmd/server），或设置 CONFIG_PATH。
#   - CONFIG_PATH=/绝对路径/custom.yaml：必须存在且格式正确。
#
# 环境变量 PORT、MYSQL_DSN 会覆盖本文件中的同名项。
#
http_port: "8080"

