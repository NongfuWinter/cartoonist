# 配置示例（可提交仓库）。本地开发请复制为 config.local.yaml 后填写真实值。
#
# 加载规则（见 internal/config/config.go）：
#   - 默认读取「当前工作目录」下的 config/config.local.yaml（不存在则仅用环境变量 / 内置默认）。
#     建议在 backend 目录启动：go run ./cmd/server
#   - CONFIG_PATH 可指向任意 YAML（此时文件必须存在且格式正确）。
#
# 环境变量 PORT、MYSQL_DSN 会覆盖 YAML 中的同名项。
#
http_port: "8080"

# MySQL 数据源（示例占位，勿填真实密码）
mysql_dsn: "user:password@tcp(127.0.0.1:3306)/dbname?charset=utf8mb4&parseTime=True&loc=Local"
